<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance System</title>

<style>
body{
  margin:0;
  background:#111;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  padding:30px;
  color:white;
}

.container{
  width:760px;
  background:#1b1b1b;
  padding:25px;
  border-radius:14px;
  box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h2{
  text-align:center;
  color:#1e90ff;
}

.input-box{
  text-align:center;
  margin-bottom:12px;
}

input[type="date"],
input[type="text"]{
  padding:6px;
  background:#222;
  color:white;
  border:1px solid #444;
  border-radius:4px;
  width:250px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th{
  background:#007bff;
  padding:10px;
  text-align:left;
}

td{
  padding:8px;
  border-bottom:1px solid #333;
}

input,select{
  width:100%;
  padding:6px;
  background:#222;
  color:white;
  border:1px solid #444;
  border-radius:4px;
}

button{
  margin-top:20px;
  width:100%;
  padding:12px;
  background:#22aa44;
  color:white;
  border:none;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Attendance Entry</h2>

<div class="input-box">
Date:
<input type="date" id="date">
</div>

<div class="input-box">
Activity:
<input type="text" id="activity" placeholder="Enter activity name">
</div>

<table id="table">
<thead>
<tr>
<th>Student Name</th>
<th>Status</th>
<th>Reason</th>
<th>Score</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button onclick="submitData()">Submit</button>

</div>

<script>

const students = [
"Abhay Chandel",
"ABUJAR JAKIRHUSEN SHAIKH",
"Ananya Dixit",
"Anjali",
"Anshul Kapoor",
"Arman Sandhu",
"Ashish",
"Ashutosh Tiwari",
"B. Charan Teja",
"Bhukya Prashanthi",
"BHUPATHI GOKULA BALA SAI",
"Borra Sandeep",
"Daksh Yadav"
];

const tbody = document.querySelector("#table tbody");

students.forEach(name=>{
  let row = `
  <tr>
    <td>${name}</td>
    <td>
      <select onchange="handleStatus(this)">
        <option>Present</option>
        <option>Absent</option>
      </select>
    </td>
    <td><input placeholder="Reason if absent..." disabled></td>
    <td><input type="number" value="10"></td>
  </tr>`;
  tbody.innerHTML += row;
});

function handleStatus(select){
  const row = select.closest("tr");
  const reason = row.cells[2].querySelector("input");
  const score = row.cells[3].querySelector("input");

  if(select.value === "Absent"){
    reason.disabled = false;
    score.value = 0;
  } else {
    reason.disabled = true;
    reason.value = "";
    score.value = 10;
  }
}

async function submitData(){

  const date = document.getElementById("date").value;
  const activity = document.getElementById("activity").value;

  if(!date){ alert("Select date"); return; }
  if(!activity){ alert("Enter activity"); return; }

  const rows = document.querySelectorAll("#table tbody tr");
  let studentsData = [];

  rows.forEach(r=>{
    studentsData.push({
      name: r.cells[0].innerText,
      attendance: r.cells[1].querySelector("select").value,
      reason: r.cells[2].querySelector("input").value,
      score: r.cells[3].querySelector("input").value
    });
  });

  const payload = {
    date: date,
    activity: activity,
    students: studentsData
  };

  try {

    const res = await fetch("https://script.google.com/macros/s/AKfycbz8tAZJwo6--rjHGuU36rYETp-aXk4rcr3NclcSz-82AJph-5PnpnAfPkhxGOqIINVA/exec", {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: "data=" + encodeURIComponent(JSON.stringify(payload))
    });

    const text = await res.text();
    console.log(text);

    alert("Attendance Saved Successfully!");

  } catch (err) {
    console.error(err);
    alert("Error sending data.");
  }
}

</script>

</body>
</html>
