<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Entry</title>
  <style>
    :root {
      --bg: #111;
      --card: #1b1b1b;
      --line: #2a2a2a;
      --input: #2a2a2a;
      --blue: #1185ff;
      --green: #26b04a;
      --text: #fff;
      --muted: #9b9b9b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border-radius: 12px;
      border: 1px solid #1f1f1f;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.45);
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .title {
      margin: 0;
      color: var(--blue);
      font-size: 33px;
      font-weight: 700;
      line-height: 1;
    }

    #date {
      width: 118px;
      padding: 6px 8px;
      background: var(--input);
      color: #ffffff;
      border: 1px solid #4a4a4a;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      outline: none;
    }

    .activity-wrap {
      margin-bottom: 14px;
    }

    #activity {
      width: 100%;
      background: var(--input);
      color: #ffffff;
      border: 1px solid #4a4a4a;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
    }

    #activity::placeholder {
      color: var(--muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: var(--blue);
      color: #ffffff;
      text-align: left;
      padding: 10px;
      font-weight: 700;
      font-size: 14px;
    }

    tbody td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      font-size: 15px;
    }

    tbody td:first-child {
      width: 42%;
      white-space: nowrap;
    }

    tbody td:nth-child(2) {
      width: 20%;
    }

    tbody td:nth-child(3) {
      width: 28%;
    }

    tbody td:nth-child(4) {
      width: 10%;
    }

    select,
    .reason-input,
    .score-input {
      width: 100%;
      background: var(--input);
      color: #ffffff;
      border: 1px solid #4a4a4a;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 14px;
      height: 30px;
      outline: none;
    }

    .reason-input::placeholder {
      color: var(--muted);
    }

    .reason-input:disabled {
      opacity: 0.9;
      cursor: not-allowed;
    }

    .score-input {
      text-align: center;
    }

    #submitBtn {
      margin-top: 24px;
      width: 100%;
      border: none;
      border-radius: 6px;
      background: var(--green);
      color: #fff;
      padding: 12px;
      font-size: 29px;
      font-weight: 700;
      cursor: pointer;
    }

    #submitBtn:hover {
      filter: brightness(1.04);
    }

    @media (max-width: 700px) {
      .container {
        padding: 14px;
      }

      .top-bar {
        justify-content: flex-start;
      }

      .title {
        font-size: 26px;
      }

      tbody td:first-child {
        white-space: normal;
      }

      #submitBtn {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1 class="title">Attendance Entry:</h1>
      <input type="date" id="date" />
    </div>

    <div class="activity-wrap">
      <input type="text" id="activity" placeholder="Enter activity name" />
    </div>

    <table id="attendanceTable">
      <thead>
        <tr>
          <th>Student Name</th>
          <th>Status</th>
          <th>Reason for Absence</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <button id="submitBtn" type="button">PUSH DATA TO GOOGLE SHEETS</button>
  </div>

  <script>
    const students = [
      "Abhay Chandel",
      "ABUJAR JAKIRHUSEN SHAIKH",
      "Ananya dixit",
      "Anjali",
      "Anshul Kapoor",
      "Arman sandhu",
      "Ashish",
      "Ashutosh Tiwari",
      "B.Charan teja",
      "Bhukya prashanthi",
      "BHUPATHI GOKULA BALA SAI",
      "Borra Sandeep",
      "Daksh yadav"
    ];

    const tableBody = document.querySelector("#attendanceTable tbody");
    const dateInput = document.getElementById("date");
    const activityInput = document.getElementById("activity");
    const submitBtn = document.getElementById("submitBtn");

    function createStudentRow(name) {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${name}</td>
        <td>
          <select class="status-select">
            <option value="Present">Present</option>
            <option value="Absent">Absent</option>
          </select>
        </td>
        <td><input class="reason-input" type="text" placeholder="Enter reason if absent..." disabled /></td>
        <td><input class="score-input" type="number" value="10" readonly /></td>
      `;

      const statusSelect = row.querySelector(".status-select");
      const reasonInput = row.querySelector(".reason-input");
      const scoreInput = row.querySelector(".score-input");

      statusSelect.addEventListener("change", () => {
        if (statusSelect.value === "Absent") {
          reasonInput.disabled = false;
          scoreInput.value = 0;
        } else {
          reasonInput.disabled = true;
          reasonInput.value = "";
          scoreInput.value = 10;
        }
      });

      return row;
    }

    students.forEach((name) => {
      tableBody.appendChild(createStudentRow(name));
    });

    async function submitData() {
      const date = dateInput.value;
      const activity = activityInput.value.trim();

      if (!date || !activity) {
        alert("Please fill in both Date and Activity.");
        return;
      }

      const rows = tableBody.querySelectorAll("tr");
      const studentsPayload = [];

      rows.forEach((row) => {
        studentsPayload.push({
          name: row.cells[0].textContent.trim(),
          attendance: row.querySelector(".status-select").value,
          reason: row.querySelector(".reason-input").value.trim(),
          score: row.querySelector(".score-input").value
        });
      });

      const body = {
        date: date,
        activity: activity,
        students: studentsPayload
      };

      try {
        const response = await fetch("https://script.google.com/macros/s/AKfycbzikWvgeg93mmOL4SC8jWSc_HJZErfuKQNW2PNLhqa9HU8uCbUXUFHr0fKPr6bkejHD/exec", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(body)
        });

        const responseText = await response.text();
        console.log(responseText);

        if (!response.ok) {
          alert("Error sending data.");
          return;
        }

        alert("Attendance saved successfully.");
      } catch (error) {
        console.error(error);
        alert("Error sending data.");
      }
    }

    submitBtn.addEventListener("click", submitData);
  </script>
</body>
</html>
